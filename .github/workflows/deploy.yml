# .github/workflows/deploy.yml
# ============================================================
# Nifty Scalper — CI/CD Pipeline
# ============================================================
# Runs on every push to main branch:
#   1. Run automated tests (syntax, imports, logic checks)
#   2. If tests pass, deploy to Google Cloud VPS via SSH
#
# SETUP REQUIREMENTS (one-time, in GitHub repo Settings → Secrets):
#   GCP_SSH_PRIVATE_KEY  : Your SSH private key (contents of ~/.ssh/id_rsa)
#   GCP_HOST             : Your GCP VM external IP (e.g. 34.100.200.50)
#   GCP_USER             : SSH username on the VM (e.g. "kiran")
#   GCP_DEPLOY_PATH      : Path on VM (e.g. /home/kiran/nifty_scalper)
#   ENV_FILE_CONTENTS    : Full contents of your .env file (as a secret)
#   MASTER_ENCRYPTION_KEY: Your Fernet encryption key
#   SUBSCRIBERS_ENC      : Base64-encoded content of subscribers.enc.json
#
# GCP VM FIRST-TIME SETUP (run manually on the VM):
#   sudo apt update && sudo apt install -y python3.11 python3-pip git
#   pip3 install -r requirements.txt
#   mkdir -p /home/kiran/nifty_scalper/data /home/kiran/nifty_scalper/logs
#
# HOW TO VIEW LOGS ON THE VM:
#   ssh kiran@YOUR_IP
#   tail -f /home/kiran/nifty_scalper/logs/live_trading_YYYY-MM-DD.log
# ============================================================

name: Test and Deploy — Nifty Scalper

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ============================================================
  # JOB 1: RUN TESTS
  # ============================================================
  test:
    name: Run Automated Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8 (syntax check)
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.git,__pycache__,backtest_results,data
          # Warning-level checks (won't fail the build, just report)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=100 \
            --statistics --exclude=.git,__pycache__,backtest_results,data

      - name: Create minimal .env for tests
        run: |
          cat > .env << 'EOF'
          APP_ENV=test
          MASTER_ENCRYPTION_KEY=dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXRlc3Q=
          TELEGRAM_BOT_TOKEN=0000000000:test
          TELEGRAM_ADMIN_CHAT_ID=000000000
          TELEGRAM_CHANNEL_ID=-100000000000
          ZERODHA_ADMIN_API_KEY=test_key
          ZERODHA_ADMIN_API_SECRET=test_secret
          ANGEL_ADMIN_API_KEY=test
          ANGEL_ADMIN_CLIENT_ID=test
          ANGEL_ADMIN_PASSWORD=test
          ANGEL_ADMIN_TOTP_SECRET=JBSWY3DPEHPK3PXP
          EOF
          mkdir -p data logs

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing \
            --ignore=tests/test_live.py \
            -x  # Stop on first failure
        env:
          APP_ENV: test

      - name: Test config module loads
        run: python -c "import config; print('Config OK')"

      - name: Test strategy module loads
        run: python -c "from strategy import NiftyScalperStrategy; print('Strategy OK')"

      - name: Test broker_base module loads
        run: python -c "from broker_base import BrokerBase, OrderRequest; print('BrokerBase OK')"

      - name: Test database module
        run: |
          python -c "
          from pathlib import Path
          from database import TradeDatabase
          db = TradeDatabase(Path('/tmp/test_trade.db'))
          db.initialize()
          db.log_entry('TEST', 'zerodha', 'NIFTY24JUL22100CE', 'CE', 25, 150.5, 13.5, 57.2, 22100.0)
          db.log_exit('TEST', 'zerodha', 'PROFIT_TARGET', 500.0)
          print('Database OK')
          "

  # ============================================================
  # JOB 2: DEPLOY TO GCP (only on push to main, tests must pass)
  # ============================================================
  deploy:
    name: Deploy to GCP VM
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Add GCP host to known_hosts to prevent prompt
          ssh-keyscan -H ${{ secrets.GCP_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Write .env file to VM
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }} \
              "cat > ${{ secrets.GCP_DEPLOY_PATH }}/.env << 'ENVEOF'
          ${{ secrets.ENV_FILE_CONTENTS }}
          ENVEOF"

      - name: Write encrypted subscriber config to VM
        run: |
          echo "${{ secrets.SUBSCRIBERS_ENC }}" | base64 -d | \
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }} \
              "cat > ${{ secrets.GCP_DEPLOY_PATH }}/data/subscribers.enc.json"

      - name: Deploy code to GCP VM
        run: |
          # Copy all Python files (not data or logs — those stay on server)
          rsync -avz \
            --exclude='.git' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='data/' \
            --exclude='logs/' \
            --exclude='backtest_results/' \
            --exclude='*.db' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ \
            ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }}:${{ secrets.GCP_DEPLOY_PATH }}/

      - name: Install/update dependencies on VM
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }} \
              "cd ${{ secrets.GCP_DEPLOY_PATH }} && pip3 install -r requirements.txt --quiet"

      - name: Restart trading service on VM
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }} \
              "sudo systemctl restart nifty-scalper || true"
          # Note: systemd service file setup is a one-time manual step.
          # See README.md for service setup instructions.

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.GCP_USER }}@${{ secrets.GCP_HOST }} \
              "cd ${{ secrets.GCP_DEPLOY_PATH }} && python3 -c 'import config; print(\"Deploy verified ✅\")'"

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment to GCP successful!"
          echo "   Host: ${{ secrets.GCP_HOST }}"
          echo "   Path: ${{ secrets.GCP_DEPLOY_PATH }}"
          echo "   Branch: ${{ github.ref_name }}"
          echo "   Commit: ${{ github.sha }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment FAILED. Check the logs above."
          echo "   The previous version is still running on the server."
